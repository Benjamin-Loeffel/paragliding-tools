name: docs

# Build the bilingual MkDocs site and deploy it to GitHub Pages.
# Repo setting required once: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'examples/output/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material mkdocs-static-i18n
      - name: Stage figures (single source = examples/output)
        run: |
          mkdir -p docs/assets
          cp -r examples/output/* docs/assets/
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Larger artifact (interactive 3D HTML ~90 MB) needs longer than the
          # 10-min default for Pages to publish, otherwise "Timeout reached".
          timeout: 1800000
